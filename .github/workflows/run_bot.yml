name: Bot Ambil Data Gangguan

on:
  schedule:
    # Jalankan otomatis setiap 1 jam sekali (UTC time)
    - cron: '0 * * * *'
  # Bisa juga dijalankan manual dari tab Actions
  workflow_dispatch:

# Memberikan izin tulis ke token bawaan GitHub agar bisa commit file JSON
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies & Chrome
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        sudo apt-get update
        sudo apt-get install -y chromium-browser

    - name: Run Python Script
      env:
        # Menggunakan token bawaan GitHub (TIDAK PERLU PAT)
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        EMAIL_WEB: ${{ secrets.EMAIL_WEB }}
        PASS_WEB: ${{ secrets.PASS_WEB }}
      run: |
        python main.py
