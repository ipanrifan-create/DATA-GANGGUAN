name: Bot Ambil Data Gangguan

on:
  schedule:
    # Berjalan otomatis setiap 1 jam sekali pada menit ke-38 (Bypass antrean padat GitHub)
    - cron: '38 * * * *'

# Memberikan izin tulis ke token bawaan GitHub agar bisa commit file JSON
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies & Chrome
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        sudo apt-get update
        sudo apt-get install -y chromium-browser

    - name: Run Python Script
      env:
        # Menggunakan token bawaan GitHub (TIDAK PERLU PAT)
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        EMAIL_WEB: ${{ secrets.EMAIL_WEB }}
        PASS_WEB: ${{ secrets.PASS_WEB }}
      run: |
        python main.py
